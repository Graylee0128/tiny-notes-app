name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: [self-hosted, Linux, X64, homelab, k3s]

    steps:
      - name: Deploy to homelab runner
        run: |
          kubectl set image deployment/tiny-note-app tiny-note-app=ghcr.io/graylee0128/tiny-notes-app:latest
          kubectl rollout status deployment/tiny-note-app
