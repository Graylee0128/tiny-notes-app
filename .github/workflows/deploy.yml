name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write

env:
  IMAGE_NAME: ghcr.io/graylee0128/tiny-notes-app
  KUBECONFIG: /home/graylee/.kube/config

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: [self-hosted, Linux, X64, homelab, k3s]

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update deployment manifest image tag
        run: |
          IMAGE_TAG="sha-${{ github.event.workflow_run.head_sha }}"
          sed -i "s|image: .*|image: ${IMAGE_NAME}:${IMAGE_TAG}|" k8s/deployment.yaml
          grep "image:" k8s/deployment.yaml

      - name: Commit and push manifest change
        run: |
          IMAGE_TAG="sha-${{ github.event.workflow_run.head_sha }}"

          if git diff --quiet -- k8s/deployment.yaml; then
            echo "No manifest change to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml
          git commit -m "chore(deploy): update image to ${IMAGE_NAME}:${IMAGE_TAG} [skip ci]"
          git push origin HEAD:main
