name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

env:
  IMAGE_NAME: ghcr.io/graylee0128/tiny-notes-app
  KUBECONFIG: /home/graylee/.kube/config

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: [self-hosted, Linux, X64, homelab, k3s]

    steps:
      - name: Deploy exact image from CI
        run: |
          IMAGE_TAG="sha-${{ github.event.workflow_run.head_sha }}"
          kubectl set image deployment/tiny-note-app tiny-note-app=${IMAGE_NAME}:${IMAGE_TAG}
          kubectl rollout status deployment/tiny-note-app
